<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}پنل مدیریت اشتراک AutoGarideh{% endblock %}</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Tahoma, "Segoe UI", sans-serif;
    background: #f5f6f8; color: #1f2328;
    margin: 0; padding: 24px;
  }
  a { color: #1C4D8D; }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { color: #1C4D8D; font-size: 22px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; background: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #e1e4e8; }
  th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #e1e4e8; font-size: 13px; }
  th { background: #eef0f3; color: #1C4D8D; }
  tr:last-child td { border-bottom: none; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
  .badge.ok { background: #e6f4ea; color: #1a7f37; }
  .badge.bad { background: #fdecea; color: #b8241f; }
  .badge.warn { background: #fdf3e0; color: #b3720a; }
  button, .btn {
    background: #1C4D8D; color: white; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  button:hover, .btn:hover { background: #163d6f; }
  .btn.danger { background: #d1332f; } .btn.danger:hover { background: #b8241f; }
  .btn.secondary { background: #6a737d; } .btn.secondary:hover { background: #565d66; }
  form.inline { display: inline; }
  input, select {
    background: #ffffff; border: 1px solid #d0d7de; border-radius: 6px;
    color: #1f2328; padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .card { background: #ffffff; border: 1px solid #e1e4e8; border-radius: 10px; padding: 18px; margin-bottom: 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .error { color: #b8241f; margin-top: 8px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
