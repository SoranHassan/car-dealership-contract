{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 380px; margin: 80px auto;">
  <h1 style="text-align:center;">🔐 ورود به پنل مدیریت</h1>
  <form method="post" action="/admin/login">
    <div class="row" style="flex-direction: column; align-items: stretch;">
      <input type="password" name="password" placeholder="رمز عبور ادمین" autofocus required style="width:100%;">
      <button type="submit" style="margin-top: 10px;">ورود</button>
    </div>
  </form>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
</div>
{% endblock %}
